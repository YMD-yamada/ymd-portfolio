# Cloudflare Pages へ静的サイトをデプロイ（*.pages.dev / 独自ドメイン）。
#
# GitHub → Settings → Secrets and variables → Actions → Repository secrets:
#   CLOUDFLARE_API_TOKEN   … 下記 RUNBOOK の「権限チェックリスト」どおりに作成
#   CLOUDFLARE_ACCOUNT_ID  … Cloudflare ダッシュボード右の Account ID
#
# 注意: Environment secrets だけに置くと、このワークフローからは読めません。

name: Deploy to Cloudflare Pages

on:
  workflow_dispatch:
  push:
    branches: ["master", "main"]

concurrency:
  group: cloudflare-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static data
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm exec -- wrangler pages deploy . --project-name=ymd-portfolio-site
