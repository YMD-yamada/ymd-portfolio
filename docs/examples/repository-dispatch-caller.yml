# コピー用の例: 「別リポジトリ」の .github/workflows/ に置く
#
# 事前: PAT を作り、別リポの Secrets に PORTFOLIO_DISPATCH_TOKEN を保存。
# repository: はポートフォリオの owner/name に合わせる。
# event-type: はポートフォリオ側と一致させる（rebuild-portfolio）。

name: Notify portfolio

on:
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PORTFOLIO_DISPATCH_TOKEN }}
          repository: YMD-yamada/ymd-portfolio
          event-type: rebuild-portfolio
