<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portfolio Studio</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body data-site-config="config/site.json" data-app-config="config/apps.config.json" data-apps="data/apps.json">
    <main class="admin">
      <header class="admin__head">
        <a href="index.html" class="admin__back">← 公開ページに戻る</a>
        <h1>Portfolio Studio</h1>
        <p>表示名・説明・カテゴリ・公開範囲・対象モード（子供/通常/大人）を管理します。適用すると公開ページに反映されます。</p>
      </header>

      <section class="card gate" id="gate-card">
        <h2>管理者認証</h2>
        <p class="muted">管理パスワードを入力してください。</p>
        <div class="row">
          <input id="admin-pass" type="password" placeholder="管理パスワード" />
          <button id="unlock-admin" class="primary" type="button">認証して編集開始</button>
        </div>
      </section>

      <section class="card hidden" id="studio-card">
        <div class="row row--between">
          <h2>カテゴリ管理</h2>
          <button id="reload" type="button">再読み込み</button>
        </div>
        <div class="row">
          <input id="new-category" type="text" placeholder="新しいカテゴリ名（例: 公開中）" />
          <button id="add-category" type="button">カテゴリ作成</button>
        </div>
        <p class="muted">↑↓で表示順を変更できます。ここで作ったカテゴリは各アプリで選択可能です。</p>
        <div id="category-manager"></div>
      </section>

      <section class="card hidden" id="apps-card">
        <h2>制作物一覧</h2>
        <p class="muted">表示名・説明・カテゴリ・公開範囲・対象モードを設定できます。R18は「大人用」に設定し、限定公開は閲覧パスワードの SHA-256 を保存します。</p>
        <div id="editor"></div>
      </section>

      <section class="card hidden" id="save-card">
        <label class="field">
          <span>ローカル反映</span>
          <p class="muted">このブラウザ内だけに即時反映します（GitHubは更新しません）。</p>
          <button id="apply-local" type="button">ローカル反映</button>
        </label>
        <hr />
        <label class="field">
          <span>GitHub公開（保存＋再デプロイ）</span>
          <p class="muted">公開時のみ、GitHub Token と公開用パスワードが必要です。</p>
        </label>
        <label class="field">
          <span>GitHub Token（repo contents write）</span>
          <input id="gh-token" type="password" autocomplete="off" placeholder="ghp_..." />
        </label>
        <label class="field">
          <span>公開用パスワード</span>
          <input id="publish-pass" type="password" autocomplete="off" placeholder="公開ボタン実行時に必須" />
        </label>
        <label class="field">
          <span>コミットメッセージ</span>
          <input id="commit-message" type="text" value="Update app visibility/category/display from studio" />
        </label>
        <div class="row">
          <button id="publish-github" class="primary" type="button">GitHub公開</button>
        </div>
        <p id="status" class="status" role="status"></p>
      </section>
    </main>

    <script src="admin.js" defer></script>
  </body>
</html>
